<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meta Ray-Ban Display Simulator</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="simulator-column" aria-label="Display simulator">
      <div class="device-label">
        <span>Meta Ray-Ban Display</span>
        <span id="display-state-label">ready</span>
      </div>
      <div
        id="display-frame"
        class="display-frame"
        role="application"
        aria-label="600 by 600 display preview"
        tabindex="0"
      ></div>
    </section>

    <aside class="control-panel" aria-label="Simulator controls">
      <header>
        <h1>Interface Simulator</h1>
        <p>600x600 preview with D-pad focus and ORB-shaped action traces.</p>
      </header>

      <label class="field">
        <span>Fixture</span>
        <select id="fixture-select">
          <option value="task-progress">Task Progress</option>
        </select>
      </label>

      <label class="field">
        <span>Display State</span>
        <select id="display-state-select">
          <option value="ready">Ready</option>
          <option value="unavailable">Unavailable</option>
          <option value="unsupported">Unsupported</option>
          <option value="firmware_update_required">Firmware Update Required</option>
          <option value="dat_app_update_required">DAT App Update Required</option>
          <option value="lifecycle_error">Lifecycle Error</option>
        </select>
      </label>

      <div class="sensor-grid" aria-label="Sensor controls">
        <label class="field">
          <span>Heading</span>
          <input id="heading-input" type="number" value="18" min="0" max="359">
        </label>
        <label class="field">
          <span>Tilt</span>
          <input id="tilt-input" type="number" value="4" min="-90" max="90">
        </label>
        <label class="field">
          <span>Latitude</span>
          <input id="latitude-input" type="number" value="37.7749" step="0.0001">
        </label>
        <label class="field">
          <span>Longitude</span>
          <input id="longitude-input" type="number" value="-122.4194" step="0.0001">
        </label>
      </div>

      <div class="button-row">
        <button id="reset-button" type="button">Reset</button>
        <button id="export-trace-button" type="button">Export Trace</button>
        <button id="export-readiness-button" type="button">Export Readiness</button>
      </div>

      <label class="field">
        <span>Load Manifest JSON</span>
        <input id="manifest-file-input" type="file" accept="application/json">
      </label>

      <section class="status-block" aria-label="Validation">
        <h2>Validation</h2>
        <ul id="validation-list"></ul>
      </section>

      <section class="status-block" aria-label="Trace log">
        <h2>Trace</h2>
        <pre id="event-log"></pre>
      </section>
    </aside>
  </main>

  <script src="./simulator.js"></script>
</body>
</html>
