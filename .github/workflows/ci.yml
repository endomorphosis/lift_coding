name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: make deps

      - name: Format (check)
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Validate display webapp readiness
        run: python3 scripts/lint_display_webapp_readiness.py config/display_webapp_readiness.example.json

      - name: Validate OpenAPI
        run: make openapi-validate

  mobile-dat-config-lanes:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dat_display_mode: [disabled, enabled]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile deps
        run: npm ci

      - name: Validate DAT lane expo config
        env:
          MWDAT_DISPLAY_MODE: ${{ matrix.dat_display_mode }}
        run: |
          CONFIG_PATH="${{ runner.temp }}/expo-config-${{ matrix.dat_display_mode }}.json"
          npx expo config --type prebuild --json > "$CONFIG_PATH"
          python3 scripts/validate_dat_expo_config.py \
            --mode "$MWDAT_DISPLAY_MODE" \
            --config-path "$CONFIG_PATH"
