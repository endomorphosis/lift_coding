  /v1/agents/tasks:
    get:
      summary: List agent tasks for the authenticated user
      description: |
        Returns a list of agent tasks scoped to the current user.
        Supports optional filtering by status and pagination via limit/offset.
        Tasks are returned in descending order by creation time (newest first).
      operationId: listAgentTasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [created, running, needs_input, completed, failed]
          description: Filter tasks by status/state
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          description: Maximum number of tasks to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of tasks to skip for pagination
      responses:
        '200':
          description: List of tasks for the user
          content:
            application/json:
              schema:
                type: object
                required: [tasks, pagination]
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
                      required: [id, state, description, created_at, updated_at]
                      properties:
                        id:
                          type: string
                          description: Task UUID
                        state:
                          type: string
                          enum: [created, running, needs_input, completed, failed]
                          description: Current task state
                        description:
                          type: string
                          description: Task instruction or description
                        created_at:
                          type: string
                          format: date-time
                          description: Task creation timestamp
                        updated_at:
                          type: string
                          format: date-time
                          description: Last update timestamp
                        pr_url:
                          type: string
                          format: uri
                          description: Optional GitHub PR URL if task created a PR
                  pagination:
                    type: object
                    required: [limit, offset, has_more]
                    properties:
                      limit:
                        type: integer
                        description: Limit used in the request
                      offset:
                        type: integer
                        description: Offset used in the request
                      has_more:
                        type: boolean
                        description: Whether more results are available
              examples:
                filtered_task_list:
                  summary: Filtered task list with normalized MCP result
                  value:
                    tasks:
                      - id: task-9b2b1d9d
                        state: completed
                        provider: ipfs_datasets_mcp
                        provider_label: IPFS Datasets
                        description: find legal datasets
                        created_at: '2026-03-09T12:00:00Z'
                        updated_at: '2026-03-09T12:01:15Z'
                        result_preview: Expanded legal query
                        result:
                          provider_label: IPFS Datasets
                          capability: dataset_discovery
                          preview: Expanded legal query
                          message: Expanded legal query
                          dataset_queries:
                            - federal labor law dataset
                            - employment regulation dataset
                    pagination:
                      limit: 50
                      offset: 0
                      has_more: false
                    filters:
                      status: completed
                      provider: ipfs_datasets_mcp
                      capability: dataset_discovery
                      result_view: normalized
                      results_only: true
                      sort: updated_at
                      direction: desc
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid_parameter:
                  summary: Invalid query parameter
                  value:
                    error: invalid_parameter
                    message: 'sort must be one of: created_at, updated_at'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

