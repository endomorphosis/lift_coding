          required: false
          schema:
            type: boolean
            default: false
          description: Include revoked keys in the response
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeysListResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/admin/api-keys/{key_id}:
    delete:
      summary: Revoke an API key (admin)
      operationId: revokeApiKey
      description: >
        Revokes an API key by marking it as revoked.
        Only available to admin users.
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
          description: API key ID
      responses:
        '204':
          description: API key revoked successfully
        '404':
          description: API key not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Forbidden (not admin)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/admin/ai/backend-policy:
    get:
      summary: Get current AI backend policy and recent remap counts (admin)
      operationId: getAiBackendPolicyReport
      description: >
        Returns the resolved AI backend policy plus recent workflow remap counts
        derived from recent AI execution audit logs for the authenticated user.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
          description: Maximum number of recent action logs to inspect
      responses:
        '200':
          description: AI backend policy report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIBackendPolicyReport'
              example:
                policy:
                  summary_backend: accelerated
                  failure_backend: composite
                recent_window:
                  log_limit: 200
                  ai_execute_logs: 12
                  policy_applied_count: 5
                time_buckets:
                  last_hour:
                    ai_execute_logs: 2
                    policy_applied_count: 1
                    remapped_capability_counts:
                      github.pr.accelerated_summary: 2
                    direct_capability_counts: {}
                    requested_workflow_counts:
                      pr_rag_summary: 1
                    resolved_workflow_counts:
                      accelerated_pr_summary: 1
                    remap_counts:
                      pr_rag_summary->accelerated_pr_summary: 1
                    action_counts:
                      ai.execute.github.pr.accelerated_summary: 2
                  last_24_hours:
                    ai_execute_logs: 7
                    policy_applied_count: 3
                    remapped_capability_counts:
                      github.pr.accelerated_summary: 2
                      github.check.accelerated_failure_explain: 1
                    direct_capability_counts:
                      github.check.failure_rag_explain: 4
                    requested_workflow_counts:
                      pr_rag_summary: 2
                      failure_rag_explain: 1
                    resolved_workflow_counts:
                      accelerated_pr_summary: 2
                      accelerated_failure_explain: 1
                    remap_counts:
                      pr_rag_summary->accelerated_pr_summary: 2
                      failure_rag_explain->accelerated_failure_explain: 1
                    action_counts:
                      ai.execute.github.pr.accelerated_summary: 3
                      ai.execute.github.check.accelerated_failure_explain: 4
                top_capabilities:
                  overall:
                    - capability_id: github.check.failure_rag_explain
                      count: 3
                    - capability_id: github.pr.accelerated_summary
                      count: 3
                  remapped:
                    - capability_id: github.pr.accelerated_summary
                      count: 3
                    - capability_id: github.check.accelerated_failure_explain
                      count: 2
                  direct:
                    - capability_id: github.check.failure_rag_explain
                      count: 3
                top_remaps:
                  - remap_key: pr_rag_summary->accelerated_pr_summary
                    count: 3
                  - remap_key: failure_rag_explain->accelerated_failure_explain
                    count: 2
                remapped_capability_counts:
                  github.pr.accelerated_summary: 3
                  github.check.accelerated_failure_explain: 2
                direct_capability_counts:
                  github.check.failure_rag_explain: 3
                requested_workflow_counts:
                  pr_rag_summary: 3
                  failure_rag_explain: 2
                resolved_workflow_counts:
                  accelerated_pr_summary: 3
                  accelerated_failure_explain: 2
                remap_counts:
                  pr_rag_summary->accelerated_pr_summary: 3
                  failure_rag_explain->accelerated_failure_explain: 2
                action_counts:
                  ai.execute.github.pr.accelerated_summary: 4
                  ai.execute.github.check.failure_rag_explain: 3
                  ai.execute.github.check.accelerated_failure_explain: 5
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

components:
  schemas:
    Profile:
      type: string
      enum: [workout, kitchen, commute, default]
      default: default

    PrivacyMode:
      type: string
      enum: [strict, balanced, debug]
      default: strict
      description: >
        Privacy mode controls data exposure in responses:
        - strict: No images, no code snippets, summaries only (default)
        - balanced: Small excerpts permitted with redaction
        - debug: Verbose (never default), includes more diagnostics

    CommandRequest:
      type: object
      required: [input, profile, client_context]
      properties:
        input:
          $ref: '#/components/schemas/CommandInput'
        profile:
          $ref: '#/components/schemas/Profile'
        client_context:
          $ref: '#/components/schemas/ClientContext'
        idempotency_key:
          type: string
          description: Client-provided idempotency key for de-duping.

    ActionCommandRequest:
      type: object
      required: [action_id, profile, client_context]
      properties:
        action_id:
          type: string
          description: Stable card action identifier such as read_cid or rerun_dataset_search.
        params:
          type: object
          additionalProperties: true
          description: >
            Optional action parameters. Supported context sources include embedded
            card payloads, task_id, or notification_id.
        profile:
          $ref: '#/components/schemas/Profile'
        client_context:
          $ref: '#/components/schemas/ClientContext'
        idempotency_key:
          type: string
          description: Client-provided idempotency key for de-duping.

    CommandInput:
      type: object
      oneOf:
        - $ref: '#/components/schemas/TextInput'
        - $ref: '#/components/schemas/AudioInput'
        - $ref: '#/components/schemas/ImageInput'
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/TextInput'
          audio: '#/components/schemas/AudioInput'
          image: '#/components/schemas/ImageInput'

    TextInput:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string
          maxLength: 2000

    AudioInput:
      type: object
      required: [type, format, uri]
      properties:
        type:
          type: string
          enum: [audio]
        format:
          type: string
          enum: [wav, m4a, mp3, opus]
        uri:
          type: string
          description: Where the backend can fetch the audio (pre-signed URL) or a local dev placeholder.
        duration_ms:
          type: integer
          minimum: 0

    ImageInput:
      type: object
      required: [type, uri]
      properties:
        type:
          type: string
          enum: [image]
        uri:
          type: string
          description: URI to the image/camera snapshot (pre-signed URL or local dev placeholder). Not fetched or processed yet.
        content_type:
          type: string
          description: MIME type of the image (e.g., image/jpeg, image/png)
          example: image/jpeg

    ClientContext:
      type: object
      required: [device, locale, timezone, app_version]
      properties:
        device:
          type: string
          description: e.g. ios, android, simulator
        locale:
          type: string
          example: en-US
        timezone:
          type: string
          example: America/Los_Angeles
        app_version:
          type: string
          example: 0.1.0
        noise_mode:
          type: boolean
          default: false
        debug:
          type: boolean
          default: false
          description: Enable debug mode to store transcript for troubleshooting
        privacy_mode:
          $ref: '#/components/schemas/PrivacyMode'

    CommandResponse:
      type: object
      required: [spoken_text, intent, status]
      properties:
        status:
          type: string
          enum: [ok, needs_confirmation, error]
        intent:
          $ref: '#/components/schemas/ParsedIntent'
        spoken_text:
          type: string
          description: Text that should be sent to TTS.
        cards:
          type: array
          items: { $ref: '#/components/schemas/UICard' }
        pending_action:
          $ref: '#/components/schemas/PendingAction'
        follow_on_task:
          $ref: '#/components/schemas/FollowOnTask'
        debug:
          $ref: '#/components/schemas/DebugInfo'

    FollowOnTask:
      type: object
      required: [task_id]
      properties:
        task_id:
          type: string
        state:
          type: string
        provider:
          type: string
        provider_label:
          type: string
        capability:
          type: string
        summary:
          type: string

    ParsedIntent:
      type: object
      required: [name, confidence]
      properties:
        name:
          type: string
          example: inbox.list
          description: >
            Intent name parsed from the command. Supported intents include:
            - inbox.list: Query inbox items
            - pr.summarize: Summarize a pull request
            - pr.merge: Merge a pull request (policy-gated)
            - agent.delegate: Delegate a task to an agent
            - agent.status: Query status of agent tasks
        confidence:
          type: number
          minimum: 0
          maximum: 1
        entities:
          type: object
          additionalProperties: true
          description: >
            Extracted entities specific to the intent. Examples:
            - pr_number (int): PR number for pr.* intents
            - issue_number (int): Issue number for agent.delegate
            - task_id (string): Agent task ID for agent.delegate
            - instruction (string): Task instruction for agent.delegate

    PendingAction:
      type: object
      required: [token, expires_at, summary]
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        summary:
          type: string
          description: Human-readable action summary for confirmation.

    UICard:
      type: object
      required: [title]
      properties:
        title:
          type: string
        subtitle:
          type: string
        lines:
          type: array
          items: { type: string }
        deep_link:
          type: string
          description: Optional link to open on phone.
        actions:
          type: array
          description: Backward-compatible example phrases for available card actions.
          items:
            type: string
        action_items:
          type: array
          description: Structured client-facing action metadata.
          items:
            $ref: '#/components/schemas/ActionItem'

    ActionItem:
      type: object
      required: [id, label, phrase]
      properties:
        id:
          type: string
          description: Stable action identifier suitable for POST /v1/commands/action.
        label:
          type: string
          description: Short UI label for buttons or menus.
        phrase:
          type: string
          description: Canonical voice/text phrase equivalent for this action.
        execution_mode:
          type: string
          nullable: true
          description: Optional execution routing hint such as direct_import or mcp_remote.
        execution_mode_label:
          type: string
          nullable: true
          description: Optional short UI badge for the execution mode, such as Local or Remote.
        params:
          type: object
          additionalProperties: true
          description: Optional action parameters or template values.

    AgentTaskControlResponse:
      type: object
      required: [task_id, state, message]
      properties:
        task_id:
          type: string
        state:
          type: string
        message:
          type: string
        updated_at:
          type: string
          format: date-time
          nullable: true

    DebugInfo:
      type: object
      properties:
        transcript:
          type: string
        tool_calls:
          type: array
          items:
            type: object
            additionalProperties: true

    ConfirmRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        idempotency_key:
          type: string

    InboxResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/InboxItem' }

    InboxItem:
      type: object
      required: [type, title, priority]
      properties:
        type:
          type: string
          enum: [pr, mention, check, agent]
        title:
          type: string
        priority:
          type: integer
          minimum: 1
          maximum: 5
        repo:
          type: string
        url:
          type: string
        summary:
          type: string
        checks_passed:
          type: integer
          minimum: 0
          description: Number of checks that passed
        checks_failed:
          type: integer
          minimum: 0
          description: Number of checks that failed
        checks_pending:
          type: integer
          minimum: 0
          description: Number of checks that are pending or in progress

    RequestReviewRequest:
      type: object
      required: [repo, pr_number, reviewers]
      properties:
        repo: { type: string, example: owner/name }
        pr_number: { type: integer, minimum: 1 }
        reviewers:
          type: array
          items: { type: string }
        idempotency_key: { type: string }

    RerunChecksRequest:
      type: object
      required: [repo, pr_number]
      properties:
        repo: { type: string }
        pr_number: { type: integer, minimum: 1 }
        idempotency_key: { type: string }

    MergeRequest:
      type: object
      required: [repo, pr_number]
      properties:
        repo: { type: string }
        pr_number: { type: integer, minimum: 1 }
        merge_method:
          type: string
          enum: [merge, squash, rebase]
          default: squash
        idempotency_key: { type: string }

    ActionResult:
      type: object
      required: [ok, message]
      properties:
        ok: { type: boolean }
        message: { type: string }
        url: { type: string }

    AIWorkflow:
      type: string
      enum:
        - copilot_explain_pr
        - copilot_summarize_diff
        - copilot_explain_failure
        - pr_rag_summary
        - accelerated_pr_summary
        - failure_rag_explain
        - accelerated_failure_explain
        - find_similar_failures
        - read_stored_output
        - accelerate_generate_and_store

    AISummaryBackend:
      type: string
      enum:
        - default
        - accelerated

    AIFailureAnalysisBackend:
      type: string
      enum:
        - default
        - accelerated

    AICapabilityContext:
      type: object
      properties:
        repo:
          type: string
        pr_number:
          type: integer
          minimum: 1
        workflow_name:
          type: string
        check_name:
          type: string
        failure_target:
          type: string
        failure_target_type:
          type: string
        session_id:
          type: string

    AIGenerationOptions:
      type: object
      properties:
        model:
          type: string
        temperature:
          type: number
        max_tokens:
          type: integer
          minimum: 1
        extra:
          type: object
          additionalProperties: true

    AIEmbeddingOptions:
      type: object
      properties:
        model:
          type: string
        dimensions:
          type: integer
          minimum: 1
        extra:
          type: object
          additionalProperties: true

    AIIPFSOptions:
      type: object
      properties:
        pin:
          type: boolean
        extra:
          type: object
          additionalProperties: true

    AICapabilityExecuteRequest:
      type: object
      properties:
        capability_id:
          type: string
        workflow:
          $ref: '#/components/schemas/AIWorkflow'
        profile:
          $ref: '#/components/schemas/Profile'
        context:
          $ref: '#/components/schemas/AICapabilityContext'
        inputs:
          type: object
          additionalProperties: true
        persist_output:
          type: boolean
        generation:
          $ref: '#/components/schemas/AIGenerationOptions'
        embeddings:
          $ref: '#/components/schemas/AIEmbeddingOptions'
        ipfs:
          $ref: '#/components/schemas/AIIPFSOptions'
        options:
          type: object
          additionalProperties: true
        idempotency_key:
          type: string
      description: >
        Generic AI execution request. Callers must provide either capability_id or workflow.
      example:
        workflow: pr_rag_summary
        profile: default
        context:
          repo: openai/example
          pr_number: 123
        persist_output: true
        embeddings:
          dimensions: 384
        ipfs:
          pin: true

    AIWorkflowExecuteRequestBase:
      type: object
      properties:
        profile:
          $ref: '#/components/schemas/Profile'
        persist_output:
          type: boolean
        generation:
          $ref: '#/components/schemas/AIGenerationOptions'
        embeddings:
          $ref: '#/components/schemas/AIEmbeddingOptions'
        ipfs:
          $ref: '#/components/schemas/AIIPFSOptions'
        options:
          type: object
          additionalProperties: true
        idempotency_key:
          type: string

    AICopilotExplainPRExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [pr_number]
          properties:
            pr_number:
              type: integer
              minimum: 1
            repo:
              type: string
            session_id:
              type: string

    AICopilotSummarizeDiffExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [pr_number]
          properties:
            pr_number:
              type: integer
              minimum: 1
            repo:
              type: string
            session_id:
              type: string

    AICopilotExplainFailureExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [pr_number]
          properties:
            pr_number:
              type: integer
              minimum: 1
            repo:
              type: string
            session_id:
              type: string
            workflow_name:
              type: string
            check_name:
              type: string
            failure_target:
              type: string
            failure_target_type:
              type: string

    AIPRRAGSummaryExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [pr_number]
          properties:
            pr_number:
              type: integer
              minimum: 1
            repo:
              type: string
            session_id:
              type: string
            summary_backend:
              $ref: '#/components/schemas/AISummaryBackend'

    AIAcceleratedPRSummaryExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [pr_number]
          properties:
            pr_number:
              type: integer
              minimum: 1
            repo:
              type: string
            session_id:
              type: string

    AIFailureRAGExplainExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [pr_number]
          properties:
            pr_number:
              type: integer
              minimum: 1
            repo:
              type: string
            session_id:
              type: string
            workflow_name:
              type: string
            check_name:
              type: string
            failure_target:
              type: string
            failure_target_type:
              type: string
            history_cids:
              type: array
              description: >-
                Optional explicit IPFS CIDs containing prior persisted failure
                analyses. When omitted, the server may auto-discover recent
                matching persisted history for the same repo and target.
              items:
                type: string
            failure_backend:
              $ref: '#/components/schemas/AIFailureAnalysisBackend'

    AIAcceleratedFailureExplainExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [pr_number]
          properties:
            pr_number:
              type: integer
              minimum: 1
            repo:
              type: string
            session_id:
              type: string
            workflow_name:
              type: string
            check_name:
              type: string
            failure_target:
              type: string
            failure_target_type:
              type: string
            history_cids:
              type: array
              description: >-
                Optional explicit IPFS CIDs containing prior persisted failure
                analyses. When omitted, the server may auto-discover recent
                matching persisted history for the same repo and target.
              items:
                type: string

    AIFindSimilarFailuresExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [pr_number]
          properties:
            pr_number:
              type: integer
              minimum: 1
            history_candidates:
              type: array
              items: {}
            repo:
              type: string
            session_id:
              type: string
            workflow_name:
              type: string
            check_name:
              type: string
            failure_target:
              type: string
            failure_target_type:
              type: string
            history_cids:
              type: array
              description: >-
                Optional explicit IPFS CIDs containing prior persisted failure
                analyses. When omitted, the server may auto-discover recent
                matching persisted history for the same repo and target.
              items:
                type: string
            top_k:
              type: integer
              minimum: 1

    AIStoredOutputReadExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [cid]
          properties:
            cid:
              type: string
              minLength: 1

    AIAccelerateGenerateAndStoreExecuteRequest:
      allOf:
        - $ref: '#/components/schemas/AIWorkflowExecuteRequestBase'
        - type: object
          required: [prompt]
          properties:
            prompt:
              type: string
              minLength: 1
            kit_pin:
              type: boolean
            metadata:
              type: object
              additionalProperties: true

    AICopilotOutput:
      type: object
      required: [schema_name, schema_version, headline, summary, spoken_text]
      properties:
        schema_name:
          type: string
          enum: [copilot_output]
        schema_version:
          type: integer
          enum: [1]
        headline:
          type: string
        summary:
          type: string
        spoken_text:
          type: string
      example:
        schema_name: copilot_output
        schema_version: 1
        headline: Copilot explanation
        summary: This PR refactors AI execution into one shared contract.
        spoken_text: PR 123 moves Copilot and IPFS-backed AI execution onto one shared path.

    AIRAGSummaryOutput:
      type: object
      required:
        [schema_name, schema_version, headline, summary, spoken_text]
      properties:
        schema_name:
          type: string
          enum: [rag_summary]
        schema_version:
          type: integer
          enum: [1]
        headline:
          type: string
        summary:
          type: string
        spoken_text:
          type: string
        repo:
          type: string
        pr_number:
          type: integer
        source_summary:
          type: string
        embedding_dimensions:
          type: integer
        ipfs_cid:
          type: string
      example:
        schema_name: rag_summary
        schema_version: 1
        headline: Augmented PR summary
        summary: This PR centralizes AI capability routing.
        spoken_text: PR 123 centralizes AI capability routing and typed workflow execution.
        repo: openai/example
        pr_number: 123
        source_summary: PR summary from GitHub context
        embedding_dimensions: 384
        ipfs_cid: bafyexample123

    AIFailureAnalysisOutput:
      type: object
      required:
        [schema_name, schema_version, headline, summary, spoken_text]
      properties:
        schema_name:
          type: string
          enum: [failure_analysis]
        schema_version:
          type: integer
          enum: [1]
        headline:
          type: string
        summary:
          type: string
        spoken_text:
          type: string
        repo:
          type: string
        pr_number:
          type: integer
        failure_target:
          type: string
        failure_target_type:
          type: string
        checks_context:
          type: string
        embedding_dimensions:
          type: integer
        ipfs_cid:
          type: string
      example:
        schema_name: failure_analysis
        schema_version: 1
        headline: Failure analysis
        summary: CI Linux is failing during dependency setup.
        spoken_text: The CI Linux workflow is failing during setup before the test phase starts.
        repo: openai/example
        pr_number: 123
        failure_target: CI Linux
        failure_target_type: workflow
        checks_context: setup-python failed after dependency install
        embedding_dimensions: 384

    AISimilarFailuresOutput:
      type: object
      required:
        [schema_name, schema_version, checks_context, embedding_dimensions, ranked_matches]
      properties:
        schema_name:
          type: string
          enum: [similar_failures]
        schema_version:
          type: integer
          enum: [1]
        repo:
          type: string
        pr_number:
          type: integer
