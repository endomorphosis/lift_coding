  /v1/agents/tasks:
    get:
      summary: List agent tasks for the authenticated user
      description: |
        Returns a list of agent tasks scoped to the current user.
        Supports optional filtering by status and pagination via limit/offset.
        Tasks are returned in descending order by creation time (newest first).
      operationId: listAgentTasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [created, running, needs_input, completed, failed]
          description: Filter tasks by status/state
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
          description: Maximum number of tasks to return
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of tasks to skip for pagination
      responses:
        '200':
          description: List of tasks for the user
          content:
            application/json:
              schema:
                type: object
                required: [tasks, pagination]
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
                      required: [id, state, description, created_at, updated_at]
                      properties:
                        id:
                          type: string
                          description: Task UUID
                        state:
                          type: string
                          enum: [created, running, needs_input, completed, failed]
                          description: Current task state
                        description:
                          type: string
                          description: Task instruction or description
                        created_at:
                          type: string
                          format: date-time
                          description: Task creation timestamp
                        updated_at:
                          type: string
                          format: date-time
                          description: Last update timestamp
                        pr_url:
                          type: string
                          format: uri
                          description: Optional GitHub PR URL if task created a PR
                  pagination:
                    type: object
                    required: [limit, offset, has_more]
                    properties:
                      limit:
                        type: integer
                        description: Limit used in the request
                      offset:
                        type: integer
                        description: Offset used in the request
                      has_more:
                        type: boolean
                        description: Whether more results are available
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/agents/tasks/{task_id}/start:
    post:
      summary: Start an agent task (dev-only)
      description: |
        Transition a task from 'created' to 'running' state.
        This endpoint is only available in dev mode (HANDSFREE_AUTH_MODE=dev).
