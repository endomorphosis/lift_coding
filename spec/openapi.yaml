    Error:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true

    DependencyStatus:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          description: Name of the dependency (e.g., duckdb, redis)
        status:
          type: string
          enum: [ok, degraded, unavailable]
          description: Status of the dependency
        message:
          type: string
          description: Optional message with additional details

    StatusResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
          description: Overall service status
        version:
          type: string
          description: Service version if available
        timestamp:
          type: string
          format: date-time
          description: Current server time (ISO 8601)
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencyStatus'
          description: Status of service dependencies

    MetricsSnapshot:
      type: object
      required: [intent_counts, status_counts, confirm_outcomes, command_latency_ms]
      properties:
        intent_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of commands per intent name
          example:
            inbox.list: 42
            pr.summarize: 15
        status_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of commands per status (ok, needs_confirmation, error)
          example:
            ok: 45
            needs_confirmation: 10
            error: 2
        confirm_outcomes:
          type: object
          additionalProperties:
            type: integer
          description: Count of confirmation outcomes (ok, not_found, error)
          example:
            ok: 8
            not_found: 1
            error: 1
        command_latency_ms:
          type: object
          required: [count]
          properties:
            p50:
              type: number
              nullable: true
              description: 50th percentile (median) latency in milliseconds
            p95:
              type: number
              nullable: true
              description: 95th percentile latency in milliseconds
            count:
              type: integer
              description: Total number of latency samples

    TTSRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
          description: Text to convert to speech
        voice:
          type: string
          description: Optional voice identifier (provider-specific)
        format:
          type: string
          enum: [wav, mp3]
          default: wav
          description: Audio format for the output

    CreateRepoSubscriptionRequest:
      type: object
      required: [repo_full_name]
      properties:
        repo_full_name:
