  /v1/dev/audio:
    post:
      summary: Upload audio bytes for dev/testing (dev-only)
      operationId: uploadDevAudio
      description: >
        Accepts base64-encoded audio and saves it locally, returning a file:// URI.
        Only available when HANDSFREE_AUTH_MODE=dev.
        Use the returned URI with POST /v1/command for testing audio commands.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data_base64]
              properties:
                data_base64:
                  type: string
                  description: Base64-encoded audio bytes
                format:
                  type: string
                  enum: [wav, m4a, mp3, opus]
                  default: m4a
                  description: Audio format/extension
      responses:
        '200':
          description: Audio uploaded successfully
          content:
            application/json:
              schema:
                type: object
                required: [uri, bytes, format, user_id]
                properties:
                  uri:
                    type: string
                    format: uri
                    description: file:// URI for the uploaded audio
                  bytes:
                    type: integer
                    description: Size of audio in bytes
                  format:
                    type: string
                    description: Audio format
                  user_id:
                    type: string
                    description: User ID that uploaded the audio
        '400':
          description: Invalid request (missing/invalid data_base64, bad format, or too large)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: Forbidden (not in dev mode)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/dev/media:
    post:
      summary: Upload image/video bytes for dev/testing (dev-only)
      operationId: uploadDevMedia
      description: >
        Accepts base64-encoded media and saves it locally, returning a file:// URI.
        Only available when HANDSFREE_AUTH_MODE=dev.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data_base64]
              properties:
                data_base64:
                  type: string
                  description: Base64-encoded media bytes
                media_kind:
                  type: string
                  enum: [image, video]
                  default: image
                format:
                  type: string
                  description: Media format/extension (jpg, png, mp4, mov, etc.)
                mime_type:
                  type: string
                  description: Optional MIME type hint
      responses:
        '200':
          description: Media uploaded successfully
          content:
            application/json:
              schema:
                type: object
                required: [uri, bytes, format, media_kind, user_id]
                properties:
                  uri:
                    type: string
                    format: uri
                  bytes:
                    type: integer
                  format:
                    type: string
                  mime_type:
                    type: string
                    nullable: true
                  media_kind:
                    type: string
                    enum: [image, video]
                  user_id:
                    type: string
        '400':
          description: Invalid request (bad media_kind, invalid base64, unsupported format, or too large)
