openapi: 3.0.3
info:
  title: HandsFree Dev Companion API
  version: 1.0.0
  description: >
    API contract for a hands-free developer assistant (wearable/phone -> backend).
    Designed for fixture-driven testing and safe, policy-gated side effects.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Process health check
      operationId: processHealth
      responses:
        '200':
          description: Process is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /simulator:
    get:
      summary: Return simulator landing page
      operationId: getSimulatorPage
      responses:
        '200':
          description: HTML simulator page
          content:
            text/html:
              schema:
                type: string

  /v1/command:
    post:
      summary: Submit a hands-free command (text or audio metadata)
      operationId: submitCommand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandRequest'
      responses:
        '200':
          description: Command handled

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
              examples:
                task_spawn:
                  summary: Spawned MCP task
                  value:
                    status: ok
                    intent:
                      name: agent.result_rerun

                      confidence: 1.0
                      entities:
                        task_id: task-9b2b1d9d
                    spoken_text: Workflow rerun requested.
                    cards: []
                    pending_action: null
                    follow_on_task:
                      task_id: task-9b2b1d9d
                      state: running
                      provider: ipfs_accelerate_mcp
                      provider_label: IPFS Accelerate
                      capability: agentic_fetch
                      summary: IPFS Accelerate agentic fetch running.
                needs_confirmation:
                  summary: Confirmation required
                  value:
                    status: needs_confirmation
                    intent:
                      name: pr.merge
                      confidence: 1.0
                      entities:
                        pr_number: 456
                    spoken_text: Ready to merge PR 456. Say confirm to proceed.
                    cards: []
                    pending_action:
                      token: conf-abc123xyz
                      expires_at: '2026-01-17T01:00:00Z'
                      summary: Merge PR #456 in owner/repo
                    follow_on_task: null
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid_request:
                  summary: Invalid request payload
                  value:
                    error: validation_error
                    message: Request body failed schema validation
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/commands/confirm:
    post:
      summary: Confirm a previously proposed side-effect action
      operationId: confirmCommand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmRequest'
      responses:
        '200':
          description: Confirmation processed
          content:
            application/json:
              schema:

                $ref: '#/components/schemas/CommandResponse'
              examples:
                needs_confirmation:
                  summary: Confirmation required
                  value:
                    status: needs_confirmation
                    intent:
                      name: pr.merge
                      confidence: 1.0
                      entities:
                        pr_number: 456
                    spoken_text: Ready to merge PR 456. Say confirm to proceed.
                    cards: []
                    pending_action:
                      token: conf-abc123xyz
                      expires_at: '2026-01-17T01:00:00Z'
                      summary: Merge PR #456 in owner/repo
                    follow_on_task: null
                task_spawn:
                  summary: Spawned MCP task

                  value:
                    status: ok
                    intent:
                      name: agent.delegate.confirmed
                      confidence: 1.0
                      entities:
                        task_id: task-9b2b1d9d
                    spoken_text: IPFS Accelerate workflow created.
                    cards: []
                    pending_action: null
                    follow_on_task:
                      task_id: task-9b2b1d9d
                      state: running
                      provider: ipfs_accelerate_mcp
                      provider_label: IPFS Accelerate
                      capability: agentic_fetch
                      summary: IPFS Accelerate agentic fetch running.
        '404':
          description: Pending action not found/expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                expired_pending_action:
                  summary: Expired confirmation token
                  value:
                    error: expired
                    message: Pending action has expired

  /v1/commands/action:
    post:
      summary: Execute a structured card action by action ID
      operationId: submitActionCommand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionCommandRequest'
      responses:
        '200':
          description: Action handled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
              examples:
                task_spawn:
                  summary: Spawned MCP task
                  value:
                    status: ok
                    intent:
                      name: agent.result_rerun
                      confidence: 1.0
                      entities:
                        task_id: task-9b2b1d9d
                    spoken_text: Workflow rerun requested.
                    cards: []
                    pending_action: null
                    follow_on_task:
                      task_id: task-9b2b1d9d
                      state: running
                      provider: ipfs_accelerate_mcp
                      provider_label: IPFS Accelerate
                      capability: agentic_fetch
                      summary: IPFS Accelerate agentic fetch running.
                needs_confirmation:
                  summary: Confirmation required
                  value:
                    status: needs_confirmation
                    intent:
                      name: pr.merge
                      confidence: 1.0
                      entities:
                        pr_number: 456
                    spoken_text: Ready to merge PR 456. Say confirm to proceed.
                    cards: []
                    pending_action:
                      token: conf-abc123xyz
                      expires_at: '2026-01-17T01:00:00Z'
                      summary: Merge PR #456 in owner/repo
                    follow_on_task: null
        '400':
          description: Invalid action request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalid_action_id:
                  summary: Unsupported action ID
                  value:
                    error: invalid_action_id
                    message: 'Unsupported action_id: unknown_action'
                invalid_request:
                  summary: Invalid request payload
                  value:
                    error: validation_error
                    message: Request body failed schema validation
        '404':
          description: Task, notification, or card context not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/inbox:
    get:
      summary: Get attention items (PRs, mentions, failing checks)
      operationId: getInbox
      parameters:
        - in: query
          name: profile
          schema: { $ref: '#/components/schemas/Profile' }
          required: false
      responses:
        '200':
          description: Inbox items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxResponse'

  /v1/status:
    get:
      summary: Get service status
      operationId: getStatus
      description: >
        Lightweight health/status endpoint for the mobile app and simulator.
        Returns service status, version, timestamp, and dependency readiness
        (e.g., DuckDB). Does not expose sensitive configuration values.
      responses:
        '200':
          description: Service status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'

  /v1/metrics:
    get:
      summary: Get observability metrics
      operationId: getMetrics
      description: >
        Returns lightweight observability metrics for the command flow.
        Gated behind HANDSFREE_ENABLE_METRICS environment variable.
        Includes command latency percentiles (p50/p95), intent counts,
        status counts, and confirmation outcomes.
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSnapshot'
        '404':
          description: Metrics not enabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/webhooks/github:
    post:
      summary: Receive GitHub webhooks (verified by signature)
      operationId: githubWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw GitHub webhook payload
      responses:
        '202':
          description: Accepted
        '400':
          description: Invalid payload or signature
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/webhooks/retry/{event_id}:
    post:
      summary: Retry processing a webhook event (dev-only)
      operationId: retryWebhookProcessing
      description: >
        Retries normalization and notification emission for a failed webhook event.
        This endpoint is only available in dev mode and is useful for recovering
        from transient failures during webhook processing.
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The webhook event ID to retry
      responses:
        '200':
          description: Retry completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [success, failed, skipped]
                    description: The status of the retry attempt
                  message:
                    type: string
                    description: A message describing the retry result
        '403':
          description: Forbidden - not in dev mode
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Event not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/actions/request-review:
    post:
      summary: Request reviewers on a PR (policy-gated)
      operationId: requestReview
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequestReviewRequest' }
      responses:
        '200':
          description: Review request submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionResult' }
        '409':
          description: Policy denied or needs confirmation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/actions/rerun-checks:
    post:
      summary: Re-run CI checks (policy-gated)
      operationId: rerunChecks
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RerunChecksRequest' }
      responses:
        '200':
          description: Re-run triggered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionResult' }

  /v1/actions/comment:
    post:
      summary: Post a PR comment (policy-gated)
      operationId: commentOnPr
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommentRequest' }
      responses:
        '200':
          description: Comment submission handled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionResult' }
        '409':
          description: Policy denied or needs confirmation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/actions/merge:
    post:
      summary: Merge a PR (strict policy gate + confirmation)
      operationId: mergePr
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MergeRequest' }
      responses:
        '200':
          description: Merge submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionResult' }
        '409':
          description: Policy denied or needs confirmation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/execute:
    post:
      summary: Execute a shared AI capability or workflow
      operationId: executeAiCapability
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AICapabilityExecuteRequest' }
            examples:
              prRagSummary:
                summary: Generic workflow dispatch for augmented PR summary
                value:
                  workflow: pr_rag_summary
                  profile: default
                  context:
                    repo: openai/example
                    pr_number: 123
                  persist_output: true
                  embeddings:
                    dimensions: 384
                  ipfs:
                    pin: true
      responses:
        '200':
          description: AI capability executed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                ragSummary:
                  summary: Augmented PR summary response
                  value:
                    ok: true
                    capability_id: github.pr.rag_summary
                    workflow: pr_rag_summary
                    execution_mode: orchestrated
                    output_type: rag_summary
                    typed_output:
                      schema_name: rag_summary
                      schema_version: 1
                      headline: Augmented PR summary
                      summary: This PR centralizes AI capability routing.
                      spoken_text: PR 123 centralizes AI capability routing and typed workflow execution.
                      repo: openai/example
                      pr_number: 123
                      source_summary: PR summary from GitHub context
                      embedding_dimensions: 384
                      ipfs_cid: bafyexample123
                    output:
                      headline: Augmented PR summary
                      summary: This PR centralizes AI capability routing.
                      spoken_text: PR 123 centralizes AI capability routing and typed workflow execution.
                    trace:
                      capability_id: github.pr.rag_summary
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                missingWorkflow:
                  summary: Missing workflow and capability ID
                  value:
                    error: invalid_request
                    message: Either capability_id or workflow must be provided
                missingPrNumber:
                  summary: Missing PR number for a PR-based workflow
                  value:
                    error: invalid_request
                    message: github.pr.rag_summary requires context.pr_number
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/copilot/explain-pr:
    post:
      summary: Explain a PR through the typed Copilot workflow
      operationId: executeAiCopilotExplainPr
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AICopilotExplainPRExecuteRequest' }
            examples:
              explainPr:
                value:
                  pr_number: 123
                  repo: openai/example
                  profile: default
      responses:
        '200':
          description: Copilot PR explanation generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                copilotExplain:
                  value:
                    ok: true
                    capability_id: copilot.pr.explain
                    workflow: copilot_explain_pr
                    execution_mode: fixture
                    output_type: copilot_output
                    typed_output:
                      schema_name: copilot_output
                      schema_version: 1
                      headline: Copilot explanation
                      summary: This PR refactors AI execution into one shared contract.
                      spoken_text: PR 123 moves Copilot and IPFS-backed AI execution onto one shared path.
                    output:
                      headline: Copilot explanation
                      summary: This PR refactors AI execution into one shared contract.
                      spoken_text: PR 123 moves Copilot and IPFS-backed AI execution onto one shared path.
                    trace:
                      command_id: gh.copilot.explain
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/copilot/summarize-diff:
    post:
      summary: Summarize a PR diff through the typed Copilot workflow
      operationId: executeAiCopilotSummarizeDiff
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AICopilotSummarizeDiffExecuteRequest' }
            examples:
              summarizeDiff:
                value:
                  pr_number: 123
                  repo: openai/example
                  profile: default
      responses:
        '200':
          description: Copilot diff summary generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                copilotDiffSummary:
                  value:
                    ok: true
                    capability_id: copilot.pr.diff_summary
                    workflow: copilot_summarize_diff
                    execution_mode: fixture
                    output_type: copilot_output
                    typed_output:
                      schema_name: copilot_output
                      schema_version: 1
                      headline: Copilot diff summary
                      summary: The diff primarily unifies AI request routing and typed API models.
                      spoken_text: This diff mostly consolidates AI execution and adds typed workflow contracts.
                    output:
                      headline: Copilot diff summary
                      summary: The diff primarily unifies AI request routing and typed API models.
                      spoken_text: This diff mostly consolidates AI execution and adds typed workflow contracts.
                    trace:
                      command_id: gh.copilot.summarize_diff
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                missingPrNumber:
                  value:
                    error: invalid_request
                    message: copilot.pr.diff_summary requires context.pr_number
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/copilot/explain-failure:
    post:
      summary: Explain a failing PR check or workflow through the typed Copilot workflow
      operationId: executeAiCopilotExplainFailure
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AICopilotExplainFailureExecuteRequest' }
            examples:
              explainWorkflowFailure:
                value:
                  pr_number: 123
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
      responses:
        '200':
          description: Copilot failure explanation generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                copilotFailure:
                  value:
                    ok: true
                    capability_id: copilot.pr.failure_explain
                    workflow: copilot_explain_failure
                    execution_mode: fixture
                    output_type: copilot_output
                    typed_output:
                      schema_name: copilot_output
                      schema_version: 1
                      headline: Failure analysis
                      summary: CI Linux is failing while preparing the environment.
                      spoken_text: Copilot thinks the CI Linux workflow is failing during environment setup.
                    output:
                      headline: Failure analysis
                      summary: CI Linux is failing while preparing the environment.
                      spoken_text: Copilot thinks the CI Linux workflow is failing during environment setup.
                    trace:
                      command_id: gh.copilot.explain_failure
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                conflictingTargets:
                  value:
                    error: invalid_request
                    message: workflow_name and check_name are mutually exclusive
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/rag-summary:
    post:
      summary: Build an augmented PR summary through the typed RAG workflow
      operationId: executeAiRagSummary
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIPRRAGSummaryExecuteRequest' }
            examples:
              ragSummary:
                value:
                  pr_number: 123
                  repo: openai/example
                  profile: default
                  persist_output: true
                  summary_backend: accelerated
                  embeddings:
                    dimensions: 384
                  ipfs:
                    pin: true
      responses:
        '200':
          description: Augmented PR summary generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                ragSummary:
                  value:
                    ok: true
                    capability_id: github.pr.rag_summary
                    workflow: pr_rag_summary
                    execution_mode: orchestrated
                    output_type: rag_summary
                    typed_output:
                      schema_name: rag_summary
                      schema_version: 1
                      headline: Augmented PR summary
                      summary: This PR unifies AI workflow execution and typed endpoint coverage.
                      spoken_text: The PR adds typed AI workflow endpoints and centralizes AI capability routing.
                      repo: openai/example
                      pr_number: 123
                      source_summary: PR summary from GitHub context
                      embedding_dimensions: 384
                      ipfs_cid: bafyexample123
                    output:
                      headline: Augmented PR summary
                      summary: This PR unifies AI workflow execution and typed endpoint coverage.
                      spoken_text: The PR adds typed AI workflow endpoints and centralizes AI capability routing.
                    trace:
                      capability_id: github.pr.rag_summary
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                missingPrNumber:
                  value:
                    error: invalid_request
                    message: github.pr.rag_summary requires context.pr_number
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/accelerated-rag-summary:
    post:
      summary: Build an accelerated augmented PR summary through ipfs_accelerate
      operationId: executeAiAcceleratedPrSummary
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIAcceleratedPRSummaryExecuteRequest' }
            examples:
              acceleratedRagSummary:
                value:
                  pr_number: 123
                  repo: openai/example
                  profile: default
                  generation:
                    model: llama3
                  embeddings:
                    dimensions: 256
      responses:
        '200':
          description: Accelerated PR summary generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                acceleratedRagSummary:
                  value:
                    ok: true
                    capability_id: github.pr.accelerated_summary
                    workflow: accelerated_pr_summary
                    execution_mode: orchestrated
                    output_type: rag_summary
                    typed_output:
                      schema_name: rag_summary
                      schema_version: 1
                      headline: Accelerated summary for PR #123
                      summary: The PR centralizes AI execution and tightens typed API contracts.
                      spoken_text: PR 123 centralizes AI execution and tightens typed API contracts.
                      repo: openai/example
                      pr_number: 123
                      source_summary: Base GitHub summary for PR 123
                      embedding_dimensions: 256
                    output:
                      headline: Accelerated summary for PR #123
                      summary: The PR centralizes AI execution and tightens typed API contracts.
                      spoken_text: PR 123 centralizes AI execution and tightens typed API contracts.
                    trace:
                      capability_id: github.pr.accelerated_summary
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                missingPrNumber:
                  value:
                    error: invalid_request
                    message: github.pr.accelerated_summary requires context.pr_number
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/failure-rag-explain:
    post:
      summary: Build an augmented failure analysis through the typed RAG workflow
      description: >-
        `history_cids` are optional. When omitted, the server may auto-discover
        recent matching persisted failure-analysis outputs for the same repo and
        failure target.
      operationId: executeAiFailureRagExplain
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIFailureRAGExplainExecuteRequest' }
            examples:
              failureRag:
                value:
                  pr_number: 123
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  failure_backend: accelerated
                  history_cids:
                    - bafy-history-1
                  generation:
                    model: llama3
                  embeddings:
                    dimensions: 384
              failureRagAutoHistory:
                value:
                  pr_number: 123
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  generation:
                    model: llama3
                  embeddings:
                    dimensions: 384
      responses:
        '200':
          description: Augmented failure analysis generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                failureAnalysis:
                  value:
                    ok: true
                    capability_id: github.check.failure_rag_explain
                    workflow: failure_rag_explain
                    execution_mode: orchestrated
                    output_type: failure_analysis
                    typed_output:
                      schema_name: failure_analysis
                      schema_version: 1
                      headline: Failure analysis
                      summary: CI Linux is failing during dependency setup.
                      spoken_text: The CI Linux workflow is failing during setup before the test phase starts.
                      repo: openai/example
                      pr_number: 123
                      failure_target: CI Linux
                      failure_target_type: workflow
                      checks_context: setup-python failed after dependency install
                      embedding_dimensions: 384
                    output:
                      headline: Failure analysis
                      summary: CI Linux is failing during dependency setup.
                      spoken_text: The CI Linux workflow is failing during setup before the test phase starts.
                    trace:
                      capability_id: github.check.failure_rag_explain
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                conflictingTargets:
                  value:
                    error: invalid_request
                    message: workflow_name and check_name are mutually exclusive
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/accelerated-failure-explain:
    post:
      summary: Build an accelerated failure analysis through ipfs_accelerate
      description: >-
        `history_cids` are optional. When omitted, the server may auto-discover
        recent matching persisted failure-analysis outputs for the same repo and
        failure target.
      operationId: executeAiAcceleratedFailureExplain
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIAcceleratedFailureExplainExecuteRequest' }
            examples:
              acceleratedFailureExplain:
                value:
                  pr_number: 123
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  history_cids:
                    - bafy-history-1
                  generation:
                    model: llama3
                  embeddings:
                    dimensions: 256
              acceleratedFailureExplainAutoHistory:
                value:
                  pr_number: 123
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  generation:
                    model: llama3
                  embeddings:
                    dimensions: 256
      responses:
        '200':
          description: Accelerated failure analysis generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                acceleratedFailureAnalysis:
                  value:
                    ok: true
                    capability_id: github.check.accelerated_failure_explain
                    workflow: accelerated_failure_explain
                    execution_mode: orchestrated
                    output_type: failure_analysis
                    typed_output:
                      schema_name: failure_analysis
                      schema_version: 1
                      headline: Failure analysis
                      summary: CI Linux is failing during dependency setup.
                      spoken_text: The accelerated analysis says CI Linux is failing during setup before the test phase starts.
                      repo: openai/example
                      pr_number: 123
                      failure_target: CI Linux
                      failure_target_type: workflow
                      checks_context: setup-python failed after dependency install
                      embedding_dimensions: 256
                    output:
                      headline: Failure analysis
                      summary: CI Linux is failing during dependency setup.
                      spoken_text: The accelerated analysis says CI Linux is failing during setup before the test phase starts.
                    trace:
                      capability_id: github.check.accelerated_failure_explain
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                conflictingTargets:
                  value:
                    error: invalid_request
                    message: workflow_name and check_name are mutually exclusive
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/find-similar-failures:
    post:
      summary: Rank similar prior failures against current PR failure context
      description: >-
        `history_cids` are optional. When omitted, the server may auto-discover
        recent matching persisted failure-analysis outputs for the same repo and
        failure target.
      operationId: executeAiFindSimilarFailures
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIFindSimilarFailuresExecuteRequest' }
            examples:
              similarFailures:
                value:
                  pr_number: 125
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  top_k: 2
                  history_cids:
                    - bafy-history-1
                  history_candidates:
                    - summary: Dependency install failed during CI Linux setup.
                      repo: openai/example
                      pr_number: 101
                      failure_target: CI Linux
                      failure_target_type: workflow
                    - summary: A UI snapshot changed unexpectedly.
                      repo: openai/example
                      pr_number: 99
                      failure_target: Visual tests
                      failure_target_type: check
              similarFailuresAutoHistory:
                value:
                  pr_number: 125
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  top_k: 2
      responses:
        '200':
          description: Similar failures ranked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                similarFailures:
                  value:
                    ok: true
                    capability_id: github.check.find_similar_failures
                    workflow: find_similar_failures
                    execution_mode: orchestrated
                    output_type: similar_failures
                    typed_output:
                      schema_name: similar_failures
                      schema_version: 1
                      repo: openai/example
                      pr_number: 125
                      failure_target: CI Linux
                      failure_target_type: workflow
                      checks_context: "CI Linux: status=completed, conclusion=failure"
                      embedding_dimensions: 2
                      ranked_matches:
                        - score: 0.98
                          summary: Dependency install failed during CI Linux setup.
                          repo: openai/example
                          pr_number: 101
                          failure_target: CI Linux
                          failure_target_type: workflow
                    output:
                      checks_context: "CI Linux: status=completed, conclusion=failure"
                    trace:
                      capability_id: github.check.find_similar_failures
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                missingPrNumber:
                  value:
                    error: invalid_request
                    message: github.check.find_similar_failures requires context.pr_number
                conflictingTargets:
                  value:
                    error: invalid_request
                    message: workflow_name and check_name are mutually exclusive
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

