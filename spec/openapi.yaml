  /v1/admin/ai/backend-policy:
    get:
      summary: Get current AI backend policy and recent remap counts (admin)
      operationId: getAiBackendPolicyReport
      description: >
        Returns the resolved AI backend policy plus recent workflow remap counts
        derived from recent AI execution audit logs for the authenticated user.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 200
          description: Maximum number of recent action logs to inspect
        - name: capture
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: When true, persist a point-in-time snapshot while serving the report
      responses:
        '200':
          description: AI backend policy report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIBackendPolicyReport'
              example:
                policy:
                  summary_backend: accelerated
                  failure_backend: composite
                recent_window:
                  log_limit: 200
                  ai_execute_logs: 12
                  policy_applied_count: 5
                time_buckets:
                  last_hour:
                    ai_execute_logs: 2
                    policy_applied_count: 1
                    remapped_capability_counts:
                      github.pr.accelerated_summary: 2
                    direct_capability_counts: {}
                    requested_workflow_counts:
                      pr_rag_summary: 1
                    resolved_workflow_counts:
                      accelerated_pr_summary: 1
                    remap_counts:
                      pr_rag_summary->accelerated_pr_summary: 1
                    action_counts:
                      ai.execute.github.pr.accelerated_summary: 2
                  last_24_hours:
                    ai_execute_logs: 7
                    policy_applied_count: 3
                    remapped_capability_counts:
                      github.pr.accelerated_summary: 2
                      github.check.accelerated_failure_explain: 1
                    direct_capability_counts:
                      github.check.failure_rag_explain: 4
                    requested_workflow_counts:
                      pr_rag_summary: 2
                      failure_rag_explain: 1
                    resolved_workflow_counts:
                      accelerated_pr_summary: 2
                      accelerated_failure_explain: 1
                    remap_counts:
                      pr_rag_summary->accelerated_pr_summary: 2
                      failure_rag_explain->accelerated_failure_explain: 1
                    action_counts:
                      ai.execute.github.pr.accelerated_summary: 3
                      ai.execute.github.check.accelerated_failure_explain: 4
                top_capabilities:
                  overall:
                    - capability_id: github.check.failure_rag_explain
                      count: 3
                    - capability_id: github.pr.accelerated_summary
                      count: 3
                  remapped:
                    - capability_id: github.pr.accelerated_summary
                      count: 3
                    - capability_id: github.check.accelerated_failure_explain
                      count: 2
                  direct:
                    - capability_id: github.check.failure_rag_explain
                      count: 3
                top_remaps:
                  - remap_key: pr_rag_summary->accelerated_pr_summary
                    count: 3
                  - remap_key: failure_rag_explain->accelerated_failure_explain
                    count: 2
                remapped_capability_counts:
                  github.pr.accelerated_summary: 3
                  github.check.accelerated_failure_explain: 2
                direct_capability_counts:
                  github.check.failure_rag_explain: 3
                requested_workflow_counts:
                  pr_rag_summary: 3
                  failure_rag_explain: 2
                resolved_workflow_counts:
                  accelerated_pr_summary: 3
                  accelerated_failure_explain: 2
                remap_counts:
                  pr_rag_summary->accelerated_pr_summary: 3
                  failure_rag_explain->accelerated_failure_explain: 2
                action_counts:
                  ai.execute.github.pr.accelerated_summary: 4
                  ai.execute.github.check.failure_rag_explain: 3
                  ai.execute.github.check.accelerated_failure_explain: 5
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

