components:
  schemas:
    Profile:
      type: string
      enum: [workout, kitchen, commute, default]
      default: default

    PrivacyMode:
      type: string
      enum: [strict, balanced, debug]
      default: strict
      description: >
        Privacy mode controls data exposure in responses:
        - strict: No images, no code snippets, summaries only (default)
        - balanced: Small excerpts permitted with redaction
        - debug: Verbose (never default), includes more diagnostics

    CommandRequest:
      type: object
      required: [input, profile, client_context]
      properties:
        input:
          $ref: '#/components/schemas/CommandInput'
        profile:
          $ref: '#/components/schemas/Profile'
        client_context:
          $ref: '#/components/schemas/ClientContext'
        idempotency_key:
          type: string
          description: Client-provided idempotency key for de-duping.

    ActionCommandRequest:
      type: object
      required: [action_id, profile, client_context]
      properties:
        action_id:
          type: string
          description: Stable card action identifier such as read_cid or rerun_dataset_search.
        params:
          type: object
          additionalProperties: true
          description: >
            Optional action parameters. Supported context sources include embedded
            card payloads, task_id, or notification_id.
        profile:
          $ref: '#/components/schemas/Profile'
        client_context:
          $ref: '#/components/schemas/ClientContext'
        idempotency_key:
          type: string
          description: Client-provided idempotency key for de-duping.

    CommandInput:
      type: object
      oneOf:
        - $ref: '#/components/schemas/TextInput'
        - $ref: '#/components/schemas/AudioInput'
        - $ref: '#/components/schemas/ImageInput'
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/TextInput'
          audio: '#/components/schemas/AudioInput'
          image: '#/components/schemas/ImageInput'

    TextInput:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string
          maxLength: 2000

    AudioInput:
      type: object
      required: [type, format, uri]
      properties:
        type:
          type: string
          enum: [audio]
        format:
          type: string
          enum: [wav, m4a, mp3, opus]
        uri:
          type: string
          description: Where the backend can fetch the audio (pre-signed URL) or a local dev placeholder.
        duration_ms:
          type: integer
          minimum: 0

    ImageInput:
      type: object
      required: [type, uri]
      properties:
        type:
          type: string
          enum: [image]
        uri:
          type: string
          description: URI to the image/camera snapshot (pre-signed URL or local dev placeholder). Not fetched or processed yet.
        content_type:
          type: string
          description: MIME type of the image (e.g., image/jpeg, image/png)
          example: image/jpeg

    ClientContext:
      type: object
      required: [device, locale, timezone, app_version]
      properties:
        device:
          type: string
          description: e.g. ios, android, simulator
        locale:
          type: string
          example: en-US
        timezone:
          type: string
          example: America/Los_Angeles
        app_version:
          type: string
          example: 0.1.0
        noise_mode:
          type: boolean
          default: false
        debug:
          type: boolean
          default: false
          description: Enable debug mode to store transcript for troubleshooting
        privacy_mode:
          $ref: '#/components/schemas/PrivacyMode'

    CommandResponse:
      type: object
      required: [spoken_text, intent, status]
      example:
        status: ok
        intent:
          name: agent.result_rerun
          confidence: 1.0
          entities:
            task_id: task-9b2b1d9d
        spoken_text: Workflow rerun requested.
        cards: []
        pending_action: null
        follow_on_task:
          task_id: task-9b2b1d9d
          state: running
          provider: ipfs_accelerate_mcp
          provider_label: IPFS Accelerate
          capability: agentic_fetch
          summary: IPFS Accelerate agentic fetch running.
        debug:
          transcript: rerun that fetch with https://example.com
          tool_calls:
            - task_id: task-9b2b1d9d
              provider: ipfs_accelerate_mcp
              state: running
      x-examples:
        task_spawn:
          summary: Spawned MCP task
          value:
            status: ok
            intent:
              name: agent.result_rerun
              confidence: 1.0
              entities:
                task_id: task-9b2b1d9d
            spoken_text: Workflow rerun requested.
            cards: []
            pending_action: null
            follow_on_task:
              task_id: task-9b2b1d9d
              state: running
              provider: ipfs_accelerate_mcp
              provider_label: IPFS Accelerate
              capability: agentic_fetch
              summary: IPFS Accelerate agentic fetch running.
        needs_confirmation:
          summary: Confirmation required
          value:
            status: needs_confirmation
            intent:
