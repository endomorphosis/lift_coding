    Error:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }
        details:
          type: object
          additionalProperties: true

    DependencyStatus:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          description: Name of the dependency (e.g., duckdb, redis)
        status:
          type: string
          enum: [ok, degraded, unavailable]
          description: Status of the dependency
        message:
          type: string
          description: Optional message with additional details

    StatusResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
          description: Overall service status
        version:
          type: string
          description: Service version if available
        timestamp:
          type: string
          format: date-time
          description: Current server time (ISO 8601)
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/DependencyStatus'
          description: Status of service dependencies

    MetricsSnapshot:
      type: object
      required: [intent_counts, status_counts, confirm_outcomes, command_latency_ms]
      properties:
        intent_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of commands per intent name
          example:
            inbox.list: 42
            pr.summarize: 15
        status_counts:
          type: object
          additionalProperties:
            type: integer
          description: Count of commands per status (ok, needs_confirmation, error)
          example:
            ok: 45
            needs_confirmation: 10
            error: 2
        confirm_outcomes:
          type: object
          additionalProperties:
            type: integer
          description: Count of confirmation outcomes (ok, not_found, error)
          example:
            ok: 8
            not_found: 1
            error: 1
        command_latency_ms:
          type: object
          required: [count]
          properties:
            p50:
              type: number
              nullable: true
              description: 50th percentile (median) latency in milliseconds
            p95:
              type: number
              nullable: true
              description: 95th percentile latency in milliseconds
            count:
              type: integer
              description: Total number of latency samples

    TTSRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 5000
          description: Text to convert to speech
        voice:
          type: string
          description: Optional voice identifier (provider-specific)
        format:
          type: string
          enum: [wav, mp3]
          default: wav
          description: Audio format for the output

    CreateRepoSubscriptionRequest:
      type: object
      required: [repo_full_name]
      properties:
        repo_full_name:
          type: string
          minLength: 1
          description: Full repository name (e.g., "owner/repo")
        installation_id:
          type: integer
          nullable: true
          description: GitHub App installation ID (optional)

    RepoSubscriptionResponse:
      type: object
      required: [id, user_id, repo_full_name, installation_id, created_at]
      properties:
        id:
          type: string
          description: Subscription UUID
        user_id:
          type: string
          description: User UUID
        repo_full_name:
          type: string
          description: Full repository name
        installation_id:
          type: integer
          nullable: true
          description: GitHub App installation ID
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp

    RepoSubscriptionsListResponse:
      type: object
      required: [subscriptions]
      properties:
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/RepoSubscriptionResponse'

    Notification:
      type: object
      required: [id, user_id, event_type, message, metadata, created_at, priority, profile]
      properties:
        id:
          type: string
        user_id:
          type: string
        event_type:
          type: string
        message:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        priority:
          type: integer
          minimum: 1
          maximum: 5
        profile:
          type: string
        last_delivery_attempt:
          type: string
          format: date-time
          nullable: true
        delivery_status:
          type: string
          enum: [pending, success, failed]
          nullable: true
        card:
          $ref: '#/components/schemas/UICard'

    NotificationsListResponse:
      type: object
      required: [notifications, count]
      properties:
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        count:
          type: integer
          minimum: 0

    CreateNotificationSubscriptionRequest:
      type: object
      required: [endpoint]
      properties:
        endpoint:
          type: string
          minLength: 1
          description: Subscription endpoint URL or device token
        platform:
          type: string
          description: "Platform type: webpush, apns, fcm, or expo"
          enum: [webpush, apns, fcm, expo]
          default: webpush
        subscription_keys:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Provider-specific subscription keys (e.g., auth, p256dh for WebPush)

    NotificationSubscriptionResponse:
      type: object
      required: [id, user_id, endpoint, platform, subscription_keys, created_at, updated_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        endpoint:
          type: string
        platform:
          type: string
          enum: [webpush, apns, fcm, expo]
        subscription_keys:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NotificationSubscriptionsListResponse:
      type: object
      required: [subscriptions]
      properties:
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/NotificationSubscriptionResponse'

    GitHubOAuthStartResponse:
      type: object
      required: [authorize_url]
      properties:
        authorize_url:
          type: string
          format: uri
          description: GitHub OAuth authorization URL to redirect user to
        state:
          type: string
          description: Optional state parameter for CSRF protection

    GitHubOAuthCallbackResponse:
      type: object
      required: [connection_id]
      properties:
        connection_id:
          type: string
          description: ID of the created/updated GitHub connection
        scopes:
          type: string
          description: OAuth scopes granted by the user

    CreateGitHubConnectionRequest:
      type: object
      properties:
        installation_id:
          type: integer
          description: GitHub App installation ID (optional)
        token:
          type: string
          description: GitHub access token (will be stored securely in secret manager)
        token_ref:
          type: string
          description: Reference to token in secret manager (NOT the actual token). Use this OR 'token', not both.
        scopes:
          type: string
          description: Comma-separated OAuth scopes

    GitHubConnectionResponse:
      type: object
      required: [id, user_id, created_at, updated_at]
      properties:
        id:
          type: string
          description: Connection ID
        user_id:
          type: string
          description: User ID that owns this connection
        installation_id:
          type: integer
          description: GitHub App installation ID
        token_ref:
          type: string
          description: Reference to the stored token in secret manager
        scopes:
          type: string
          description: OAuth scopes
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GitHubConnectionsListResponse:
      type: object
      required: [connections]
      properties:
        connections:
          type: array
          items:
            $ref: '#/components/schemas/GitHubConnectionResponse'

    CreateApiKeyRequest:
      type: object
      properties:
        label:
          type: string
          maxLength: 100
          description: Optional user-friendly label for the key (e.g., 'Mobile app', 'CI/CD')

    ApiKeyResponse:
      type: object
      required: [id, user_id, created_at]
      properties:
        id:
          type: string
          description: API key ID
        user_id:
          type: string
          description: User ID that owns this key
        label:
          type: string
          description: User-friendly label for the key
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time
          description: Timestamp when the key was revoked (if applicable)
        last_used_at:
          type: string
          format: date-time
          description: Timestamp when the key was last used (if applicable)

    CreateApiKeyResponse:
      type: object
      required: [key, api_key]
      properties:
        key:
          type: string
          description: The plaintext API key. Save this - it will not be shown again.
        api_key:
          $ref: '#/components/schemas/ApiKeyResponse'

    ApiKeysListResponse:
      type: object
      required: [api_keys]
      properties:
        api_keys:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyResponse'
