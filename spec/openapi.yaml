          application/json:
            schema: { $ref: '#/components/schemas/AIAcceleratedFailureExplainExecuteRequest' }
            examples:
              acceleratedFailureExplain:
                value:
                  pr_number: 123
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  history_cids:
                    - bafy-history-1
                  generation:
                    model: llama3
                  embeddings:
                    dimensions: 256
              acceleratedFailureExplainAutoHistory:
                value:
                  pr_number: 123
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  generation:
                    model: llama3
                  embeddings:
                    dimensions: 256
      responses:
        '200':
          description: Accelerated failure analysis generated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                acceleratedFailureAnalysis:
                  value:
                    ok: true
                    capability_id: github.check.accelerated_failure_explain
                    workflow: accelerated_failure_explain
                    execution_mode: orchestrated
                    output_type: failure_analysis
                    typed_output:
                      schema_name: failure_analysis
                      schema_version: 1
                      headline: Failure analysis
                      summary: CI Linux is failing during dependency setup.
                      spoken_text: The accelerated analysis says CI Linux is failing during setup before the test phase starts.
                      repo: openai/example
                      pr_number: 123
                      failure_target: CI Linux
                      failure_target_type: workflow
                      checks_context: setup-python failed after dependency install
                      embedding_dimensions: 256
                    output:
                      headline: Failure analysis
                      summary: CI Linux is failing during dependency setup.
                      spoken_text: The accelerated analysis says CI Linux is failing during setup before the test phase starts.
                    trace:
                      capability_id: github.check.accelerated_failure_explain
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                conflictingTargets:
                  value:
                    error: invalid_request
                    message: workflow_name and check_name are mutually exclusive
        '401':
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/ai/find-similar-failures:
    post:
      summary: Rank similar prior failures against current PR failure context
      description: >-
        `history_cids` are optional. When omitted, the server may auto-discover
        recent matching persisted failure-analysis outputs for the same repo and
        failure target.
      operationId: executeAiFindSimilarFailures
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIFindSimilarFailuresExecuteRequest' }
            examples:
              similarFailures:
                value:
                  pr_number: 125
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  top_k: 2
                  history_cids:
                    - bafy-history-1
                  history_candidates:
                    - summary: Dependency install failed during CI Linux setup.
                      repo: openai/example
                      pr_number: 101
                      failure_target: CI Linux
                      failure_target_type: workflow
                    - summary: A UI snapshot changed unexpectedly.
                      repo: openai/example
                      pr_number: 99
                      failure_target: Visual tests
                      failure_target_type: check
              similarFailuresAutoHistory:
                value:
                  pr_number: 125
                  repo: openai/example
                  workflow_name: CI Linux
                  profile: default
                  top_k: 2
      responses:
        '200':
          description: Similar failures ranked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AICapabilityExecuteResponse' }
              examples:
                similarFailures:
                  value:
                    ok: true
                    capability_id: github.check.find_similar_failures
                    workflow: find_similar_failures
                    execution_mode: orchestrated
                    output_type: similar_failures
                    typed_output:
                      schema_name: similar_failures
                      schema_version: 1
                      repo: openai/example
                      pr_number: 125
                      failure_target: CI Linux
                      failure_target_type: workflow
                      checks_context: "CI Linux: status=completed, conclusion=failure"
                      embedding_dimensions: 2
                      ranked_matches:
                        - score: 0.98
                          summary: Dependency install failed during CI Linux setup.
                          repo: openai/example
                          pr_number: 101
                          failure_target: CI Linux
                          failure_target_type: workflow
                    output:
                      checks_context: "CI Linux: status=completed, conclusion=failure"
                    trace:
                      capability_id: github.check.find_similar_failures
        '400':
          description: Invalid AI request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                missingPrNumber:
                  value:
                    error: invalid_request
