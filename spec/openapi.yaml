          type: string
          description: User UUID
        repo_full_name:
          type: string
          description: Full repository name
        installation_id:
          type: integer
          nullable: true
          description: GitHub App installation ID
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp

    RepoSubscriptionsListResponse:
